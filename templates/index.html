<!DOCTYPE html>
<html>
<head>
    <title>GameVault - Letterboxd for Games</title>
    <style>
        body { background: #14181c; color: white; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #2c3440; padding: 10px; border-radius: 8px; text-align: center; transition: 0.2s; }
        .card:hover { transform: scale(1.05); border: 2px solid #00c030; }
        .card img { width: 100%; border-radius: 4px; }
        a { text-decoration: none; color: white; }
        input { padding: 10px; width: 300px; border-radius: 4px; border: none;}
        button { padding: 10px 20px; background: #00c030; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body>

    <center>
        <h1>GameVault</h1>
        <form method="POST">
            <input type="text" name="search_query" placeholder="Search for a game..." value="{{ query }}">
            <button type="submit">Search</button>
        </form>
    </center>

    <div class="grid">
        {% for game in games %}
        <a href="/game/{{ game.id }}">
            <div class="card">
                <img src="{{ game.cover_url }}" alt="Cover">
                <h3>{{ game.name }}</h3>
            </div>
        </a>
        {% endfor %}
    </div>

</body>
</html>
